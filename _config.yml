# ---------------------------------------------------------------------------
# Site configuration for the CipherTrust Manager installation guide
# Theme: Just the Docs (https://just-the-docs.com) — the de-facto standard
# Jekyll theme for technical documentation on GitHub Pages.
# ---------------------------------------------------------------------------

title: CipherTrust Manager — Installation & Setup Guide
description: >-
  A step-by-step, command-level guide to deploying and performing the initial
  configuration of a Thales CipherTrust Manager virtual appliance on VMware
  (private cloud) and AWS (public cloud), with explanations, sample output,
  connector/endpoint integration (KMIP, CTE, CTE-U), and SIEM/Splunk logging.

# These two values are rewritten automatically at publish time to match your
# GitHub account and repository name.
url: "https://SmittyStuff.github.io"
baseurl: "/thales-ciphertrust-manager-install-guide"

theme: just-the-docs

# Clean, trailing-slash URLs (e.g. /docs/overview/ instead of /docs/overview.html)
permalink: pretty

# ---- Navigation & layout --------------------------------------------------
aux_links:
  "View on GitHub":
    - "https://github.com/SmittyStuff/thales-ciphertrust-manager-install-guide"
aux_links_new_tab: true

# Show a "table of contents" of child pages on parent pages
nav_sort: case_insensitive

# ---- Search ---------------------------------------------------------------
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# ---- Look & feel ----------------------------------------------------------
color_scheme: dark
heading_anchors: true

# Callout styles used throughout the guide (note / warning / tip)
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: red
  important:
    title: Important
    color: yellow

# ---- Footer ---------------------------------------------------------------
footer_content: >-
  Prepared by CybSmyth. This is an independent technical walkthrough based on
  publicly available Thales documentation; it is not affiliated with or endorsed
  by Thales. Verify every step against the official Thales product documentation
  for your specific CipherTrust Manager version before use in production.

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/SmittyStuff/thales-ciphertrust-manager-install-guide"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# ---- Build ----------------------------------------------------------------
plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
